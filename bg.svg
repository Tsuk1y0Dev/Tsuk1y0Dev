<svg fill="none" viewBox="0 0 800 300" width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          font-family: 'Segoe UI', Arial, sans-serif;
          background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
          color: #38bdf8;
          padding: 20px;
          border-radius: 15px;
          height: 258px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          text-align: center;
          border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { margin: 0; font-size: 35px; color: #f8fafc; }
        p { font-size: 18px; margin-top: 10px; opacity: 0.9; }
        .cursor {
          display: inline-block; width: 10px; height: 3px;
          background-color: #38bdf8; margin-left: 5px;
          animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      </style>
      <div class="container">
        <h1>Welcome to my profile!</h1>
        <p>I build things with code<span class="cursor"></span></p>
      </div>
    </div>
  </foreignObject>
</svg>
