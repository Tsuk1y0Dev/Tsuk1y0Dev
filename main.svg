<svg fill="none" viewBox="0 0 800 550" width="800" height="550" xmlns="http://w3.org">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://w3.org">
      <style>
        .container {
          font-family: 'Segoe UI', Tahoma, sans-serif;
          background: linear-gradient(135deg, #1a1b26 0%, #24283b 100%);
          color: #a9b1d6;
          padding: 30px;
          border-radius: 15px;
          border: 1px solid #414868;
          height: 488px;
        }
        .header {
          font-size: 32px;
          font-weight: bold;
          color: #79dac8; 
          margin-bottom: 5px;
        }
        .cursor {
          display: inline-block; width: 15px; height: 4px;
          background-color: #79dac8; margin-left: 5px;
          animation: blink 1.2s infinite;
          vertical-align: middle;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .card {
          background: rgba(0, 0, 0, 0.2);
          padding: 15px;
          border-radius: 10px;
          border: 1px solid #414868;
        }
        .card-title { color: #bb9af7; font-weight: bold; margin-bottom: 10px; display: block; font-size: 16px; }
        .tag {
          display: inline-block;
          background: #3d59a1;
          color: #fff;
          padding: 2px 10px;
          border-radius: 4px;
          font-size: 12px;
          margin: 3px;
          border: 1px solid #414868;
        }
        .quote {
          margin-top: 30px;
          font-style: italic;
          color: #565f89;
          border-left: 3px solid #79dac8;
          padding-left: 15px;
          font-size: 15px;
          line-height: 1.5;
        }
      </style>
      <div class="container">
        <div class="header">> Hi there, I'm Tsuk1y0 👋<span class="cursor"></span></div>
        <div style="color: #7dcfff; font-size: 18px;">Arch Linux Enthusiast | Hyprland User</div>
        
        <div class="grid">
          <div class="card">
            <span class="card-title">🛠 System &amp; Environment</span>
            <div style="font-size: 14px; line-height: 1.7;">
              • <b>OS:</b> Arch Linux ❄️<br/>
              • <b>WM:</b> Hyprland<br/>
              • <b>Shell:</b> Zsh + OhMyZsh<br/>
              • <b>Theme:</b> Tokyo Night (Cyan)
            </div>
          </div>
          <div class="card">
            <span class="card-title">💻 Tech Stack</span>
            <div class="tag">HTML5</div> <div class="tag">JS</div> <div class="tag">Python</div>
            <div class="tag">Lua</div> <div class="tag">Vue.js</div> <div class="tag">QML</div>
            <div class="tag">Expo</div> <div class="tag">CSS3</div>
          </div>
        </div>

        <div class="quote">
          I’m looking for people who can help me better understand Linux, other Linux enthusiasts, and folks who can help me improve my English.
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
