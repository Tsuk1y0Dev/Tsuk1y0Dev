<svg fill="none" viewBox="0 0 800 500" width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
          background: linear-gradient(135deg, #1a1b26 0%, #24283b 100%);
          color: #a9b1d6;
          padding: 30px;
          border-radius: 15px;
          border: 1px solid #414868;
          height: 438px;
        }
        .header {
          font-size: 32px;
          font-weight: bold;
          color: #79dac8;
          margin-bottom: 5px;
        }
        .cursor {
          display: inline-block; width: 12px; height: 4px;
          background-color: #79dac8; margin-left: 5px;
          animation: blink 1.2s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; margin-top: 25px; }
        .card {
          background: rgba(0, 0, 0, 0.2);
          padding: 15px;
          border-radius: 10px;
          border: 1px solid #414868;
        }
        .card-title { color: #bb9af7; font-weight: bold; margin-bottom: 10px; display: block; font-size: 16px; }
        
        .tag {
          display: inline-block;
          background: #3d59a1;
          color: #fff;
          padding: 2px 10px;
          border-radius: 4px;
          font-size: 11px;
          margin: 3px;
          border: 1px solid #414868;
        }

        .sys-list { font-size: 14px; line-height: 1.8; list-style: none; padding: 0; margin: 0; }
        .sys-item b { color: #7dcfff; }

        .quote {
          margin-top: 30px;
          font-style: italic;
          color: #565f89;
          border-left: 3px solid #79dac8;
          padding-left: 15px;
          font-size: 14px;
        }
      </style>
      <div class="container">
        <div class="header">> Hi there, I'm Tsuk1y0 <span class="cursor"></span></div>
        <div style="color: #7dcfff; font-size: 18px;">Arch Linux Enthusiast | Hyprland User</div>
        
        <div class="grid">
          <div class="card">
            <span class="card-title">🛠 System &amp; Environment</span>
            <ul class="sys-list">
              <li class="sys-item"><b>OS:</b> Arch Linux ❄️</li>
              <li class="sys-item"><b>WM:</b> Hyprland</li>
              <li class="sys-item"><b>Shell:</b> Zsh + OhMyZsh</li>
              <li class="sys-item"><b>Theme:</b> Tokyo Night (Cyan)</li>
            </ul>
          </div>
          
          <div class="card">
            <span class="card-title">💻 Tech Stack</span>
            <div class="tag">HTML5</div> <div class="tag">JavaScript</div>
            <div class="tag">Python</div> <div class="tag">Lua</div>
            <div class="tag">QML</div> <div class="tag">Expo</div>
            <div class="tag">CSS3</div> <div class="tag">Vue.js</div>
          </div>
        </div>

        <div class="quote">
          I’m looking for people who can help me better understand Linux, other Linux enthusiasts, and folks who can help me improve my English.
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
